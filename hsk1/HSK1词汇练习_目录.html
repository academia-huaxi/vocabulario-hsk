<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSK1 词汇练习目录 · 华西书院</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@300;400;700&family=Noto+Serif+SC:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #d6e4cc;
  --bg2:    #b8cfaa;
  --ink:    #2d3a1e;
  --green:  #4a8a3a;
  --muted:  #6b7c5a;
  --card:   rgba(255,255,255,0.62);
  --border: rgba(74,138,58,0.22);
  --shadow: rgba(45,58,30,0.10);
}

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Crimson Pro', Georgia, serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Topbar ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.75rem 1.8rem;
  background: rgba(255,255,255,0.3);
  border-bottom: 1px solid var(--border);
}

.back-btn {
  display: inline-flex; align-items: center; gap: 0.4rem;
  color: var(--muted); text-decoration: none;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.82rem;
  transition: color 0.2s;
}
.back-btn:hover { color: var(--green); }

.logo-img {
  height: 40px; width: auto;
}

/* ── Header ── */
header {
  text-align: center;
  padding: 2rem 1rem 1.6rem;
  border-bottom: 1px solid var(--border);
}

.level-tag {
  display: inline-block;
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 0.95rem;
  color: var(--green);
  background: rgba(74,138,58,0.1);
  border: 1px solid rgba(74,138,58,0.25);
  border-radius: 20px;
  padding: 0.2rem 1rem;
  letter-spacing: 0.1em;
  margin-bottom: 0.7rem;
}

h1 {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: clamp(1.8rem, 5vw, 2.6rem);
  color: var(--ink);
  letter-spacing: 0.2em;
  margin-bottom: 0.3rem;
}

.subtitle {
  font-style: italic;
  color: var(--muted);
  font-size: 0.9rem;
  letter-spacing: 0.08em;
}

/* ── Grid ── */
main {
  max-width: 780px;
  margin: 0 auto;
  padding: 2.5rem 1.5rem 5rem;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1rem;
}

/* ── Card ── */
.game-card {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1.3rem 1.3rem 1rem;
  text-decoration: none;
  color: var(--ink);
  box-shadow: 0 2px 10px var(--shadow);
  transition: all 0.2s ease;
  min-height: 130px;
}

.game-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 22px rgba(45,58,30,0.15);
  border-color: rgba(74,138,58,0.45);
  background: rgba(255,255,255,0.82);
}

.card-num {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 2rem;
  color: var(--green);
  line-height: 1;
}

.card-label {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.72rem;
  color: var(--muted);
  margin-top: 0.2rem;
  letter-spacing: 0.04em;
}

.card-bottom {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 0.8rem;
}

.card-link {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.68rem;
  color: var(--green);
  letter-spacing: 0.03em;
}

.card-arrow {
  width: 26px; height: 26px;
  background: var(--green);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: white;
  font-size: 0.85rem;
  flex-shrink: 0;
  transition: background 0.2s;
}

.game-card:hover .card-arrow {
  background: #3a7a2a;
}

/* ── Footer ── */
footer {
  border-top: 1px solid var(--border);
  background: rgba(255,255,255,0.25);
  padding: 1.5rem 1rem;
  text-align: center;
}

.footer-contact {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 2rem;
  flex-wrap: wrap;
}

.whatsapp-box {
  display: flex; align-items: center; gap: 0.6rem;
  text-decoration: none; color: var(--ink);
}

.wa-icon {
  width: 36px; height: 36px;
  background: #25D366; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.wa-num {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 1rem; font-weight: 700;
  color: var(--ink); letter-spacing: 0.08em;
}
.wa-name { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.05em; }

.qr-box img {
  height: 72px; width: 72px;
  border-radius: 8px;
  border: 1px solid var(--border);
  object-fit: cover;
}

/* ── Animations ── */
.game-card {
  opacity: 0;
  transform: translateY(12px);
  animation: fadeUp 0.45s ease forwards;
}
.game-card:nth-child(1) { animation-delay: 0.05s; }
.game-card:nth-child(2) { animation-delay: 0.10s; }
.game-card:nth-child(3) { animation-delay: 0.15s; }
.game-card:nth-child(4) { animation-delay: 0.20s; }
.game-card:nth-child(5) { animation-delay: 0.25s; }
.game-card:nth-child(6) { animation-delay: 0.30s; }
.game-card:nth-child(7) { animation-delay: 0.35s; }
.game-card:nth-child(8) { animation-delay: 0.40s; }
.game-card:nth-child(9) { animation-delay: 0.45s; }

@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 520px) {
  main { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<div class="topbar">
  <a href="../index.html" class="back-btn">← 返回总目录 · Volver al índice</a>
  <img src="../img/logo.jpg" alt="华西书院" class="logo-img">
</div>

<footer>

</footer>

<script>
const grid = document.getElementById('grid');
for (let i = 1; i <= 9; i++) {
  const a = document.createElement('a');
  a.href = `HSK1词汇练习${i}.html`;
  a.className = 'game-card';
  a.innerHTML = `
    <div class="card-num">${i}</div>
    <div class="card-bottom">
      <span class="card-link">— Sin empezar</span>
      <span class="card-arrow">→</span>
    </div>
  `;

}
</script>

</body>
</html>
